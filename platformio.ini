; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[common]
build_unflags = 
  -std=gnu11 
  -std=gnu17
  -std=gnu++11
  -std=gnu++17
build_flags =
  -std=c99
  -Wall
  -Os
  -ffunction-sections
  -fdata-sections
  -Wl,--gc-sections

[arduino_uno]
build_src_filter =
  +<ArduinoCore/app.cpp>
  +<ArduinoCore/Common/**/*>
  +<ArduinoCore/BSP/ArduinoUno/**/*>

[env:native]
platform = native
test_framework = unity
build_type = debug
debug_test = test_user_interface
build_unflags = ${common.build_unflags}
build_flags =
  ${common.build_flags}
  -Wextra
  -Wpedantic
  -Iinclude
  -Iinclude/HAL
  -Itest
  -DUNIT_TEST

[env:app_uno_uart]
platform = atmelavr
board = uno
framework = arduino
test_framework = unity
lib_deps = 
  https://github.com/adafruit/Adafruit_QMC5883P.git
  arduino-libraries/Servo
build_src_filter =
  ${arduino_uno.build_src_filter}
  +<ArduinoCore/Arduino_UART/**/*>
monitor_speed =  115200
monitor_encoding = Latin-1
monitor_filters = send_on_enter, comonarc_log_decoder
monitor_eol = LF
monitor_echo = yes
build_unflags = ${common.build_unflags}
build_flags =
  ${common.build_flags}
  -std=c99
  -std=c++17
  -Iinclude
  -Iinclude/HAL
  -DUART_BAUDRATE=115200

